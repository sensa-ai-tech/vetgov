name: Daily Tracker Update

on:
  schedule:
    # 每日 UTC 22:17 = 台北時間 06:17
    - cron: "17 22 * * *"
  workflow_dispatch:
    inputs:
      run_llm:
        description: "Run LLM analysis (requires ANTHROPIC_API_KEY secret)"
        required: false
        default: "true"

concurrency:
  group: tracker-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: projects/08-vet-drug-policy-tracker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: projects/08-vet-drug-policy-tracker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest tests.test_classifier -v

      - name: Initialize DB with seed
        run: python -m src.cli init --with-seed

      - name: Ingest sources
        run: python -m src.cli ingest
        continue-on-error: true

      - name: LLM analyze (optional)
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.cli analyze --limit 15
        continue-on-error: true

      - name: Build site data
        run: python -m src.cli build-site

      - name: Show stats
        run: python -m src.cli stats

      - name: Commit updates
        run: |
          git config user.name "tracker-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(tracker): daily update $(date -u +%Y-%m-%d)"
            git push
          fi
        working-directory: ${{ github.workspace }}
