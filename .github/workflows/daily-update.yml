name: Daily Tracker Update

# 每日自動跑:抓取所有資料源 → 關鍵字分類 → (選用) Claude 萃取 → 更新 site/data.json → commit + push
# Vercel 偵測到 commit 後會自動重新部署。

on:
  schedule:
    # 每日 UTC 22:17 = 台北時間 06:17
    # 也排一次 UTC 10:17 = 台北時間 18:17 (傍晚追蹤)
    - cron: "17 22 * * *"
    - cron: "17 10 * * *"
  workflow_dispatch:
    inputs:
      skip_llm:
        description: "Skip LLM analysis (dry run)"
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "config/sources.yaml"
      - "src/**"
      - "data/seed_events.json"
      - ".github/workflows/daily-update.yml"

concurrency:
  group: tracker-update
  cancel-in-progress: false

jobs:
  update:
    name: Ingest, Analyze, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest tests.test_classifier -v

      - name: Initialize DB with seed events
        run: python -m src.cli init --with-seed

      - name: Ingest all sources (RSS + Google News + Gov)
        run: python -m src.cli ingest
        continue-on-error: true

      - name: LLM event extraction (Claude Haiku)
        if: ${{ secrets.ANTHROPIC_API_KEY != '' && inputs.skip_llm != true }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.cli analyze --limit 20
        continue-on-error: true

      - name: Build static site data
        run: python -m src.cli build-site

      - name: Show DB statistics
        run: python -m src.cli stats

      - name: Commit & push if changed
        env:
          GIT_AUTHOR_NAME: tracker-bot
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: tracker-bot
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git add site/data.json
          if git diff --cached --quiet; then
            echo "::notice::No data changes to commit."
            exit 0
          fi
          NEW_EVENTS=$(python -c "import json; d=json.load(open('site/data.json')); print(len(d['events']))")
          git commit -m "chore(tracker): daily update $(date -u +%Y-%m-%dT%H:%MZ) · ${NEW_EVENTS} events"
          git push origin HEAD:main
          echo "::notice::Pushed update with ${NEW_EVENTS} events."

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tracker-debug-${{ github.run_id }}
          path: |
            data/events.db
            site/data.json
          retention-days: 7
          if-no-files-found: ignore
